<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Mix - 3 </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f6f8;
}

/* Card estilo MIX */
.card {
    border-radius: 10px;
    border: none;
}

/* Título */
.titulo {
    color: #1e4ea1;
    font-weight: 600;
}

/* Círculo etapa */
.step {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid #1e4ea1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #1e4ea1;
}

/* Botão padrão */
.btn-mix {
    background-color: #1e4ea1;
    color: white;
}

.btn-mix:hover {
    background-color: #163b7a;
}

/* Inputs */
.form-control {
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="col-md-4">

<div class="card shadow p-4">

<!-- TÍTULO -->
<h5 class="text-center titulo mb-4">Crie sua conta</h5>

<!-- ETAPA -->
<div class="d-flex align-items-center mb-3">
    <div class="step me-3">1</div>
    <div>
        <strong>Qual o seu endereço?</strong><br>
        <small class="text-muted">Informe onde deseja receber</small>
    </div>
</div>

<!-- FORM -->
<form id="form1">

<input type="text" class="form-control mb-3" placeholder="CEP">
<input type="text" class="form-control mb-3" placeholder="Rua">

<div class="row">
    <div class="col">
        <input type="text" class="form-control mb-3" placeholder="Número">
    </div>
    <div class="col">
        <input type="text" class="form-control mb-3" placeholder="Complemento">
    </div>
</div>

<input type="text" class="form-control mb-3" placeholder="Bairro">

<div class="row">
    <div class="col">
        <input type="text" class="form-control mb-3" placeholder="Cidade">
    </div>
    <div class="col">
        <input type="text" class="form-control mb-3" placeholder="Estado">
    </div>
</div>

<input type="text" class="form-control mb-4" placeholder="Apelido do endereço">

<button type="button" class="btn btn-mix w-100" onclick="nextStep(2)">
Avançar
</button>

</form>

<!-- ETAPA 2 -->
<form id="form2" style="display:none">

<div class="d-flex align-items-center mb-3">
    <div class="step me-3">2</div>
    <div>
        <strong>Tipo de perfil</strong><br>
        <small class="text-muted">Escolha uma opção</small>
    </div>
</div>

<button type="button" class="btn btn-outline-secondary w-100 mb-2">
Pessoa Física
</button>

<button type="button" class="btn btn-outline-secondary w-100 mb-4">
Pessoa Jurídica
</button>

<div class="d-flex gap-2">
<button type="button" class="btn btn-outline-primary w-50" onclick="nextStep(1)">
Voltar
</button>

<button type="button" class="btn btn-mix w-50" onclick="nextStep(3)">
Avançar
</button>
</div>

</form>

<!-- ETAPA 3 -->
<form id="form3" style="display:none">

<div class="d-flex align-items-center mb-3">
    <div class="step me-3">3</div>
    <div>
        <strong>Crie sua senha</strong><br>
        <small class="text-muted">Finalize seu cadastro</small>
    </div>
</div>

<input type="password" class="form-control mb-3" placeholder="Senha">
<input type="password" class="form-control mb-3" placeholder="Confirmar senha">

<div class="form-check">
  <input class="form-check-input" type="checkbox">
  <label class="form-check-label">
    Aceito os termos
  </label>
</div>

<div class="d-flex gap-2 mt-4">
<button type="button" class="btn btn-outline-primary w-50" onclick="nextStep(2)">
Voltar
</button>

<button type="button" class="btn btn-mix w-50" onclick="finalizar()">
Finalizar
</button>
</div>

</form>

<!-- SUCESSO -->
<div id="sucesso" style="display:none" class="text-center">

<div class="step mx-auto mb-3">✔</div>

<h5 class="titulo">Cadastro realizado!</h5>

<button class="btn btn-mix w-100 mt-3">
Começar a comprar
</button>

</div>

</div>
</div>
</div>

<script>
function nextStep(step) {
    document.getElementById("form1").style.display = "none";
    document.getElementById("form2").style.display = "none";
    document.getElementById("form3").style.display = "none";

    document.getElementById("form" + step).style.display = "block";
}

function finalizar() {
    document.getElementById("form3").style.display = "none";
    document.getElementById("sucesso").style.display = "block";
}
</script>

</body>
</html>
