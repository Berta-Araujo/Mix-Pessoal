<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro-Mix Conveniência</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-5">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">Criar Conta</h3>
<img src="images/mixsemfundo.png" width="100" class="rounded mx-auto d-block" alt="logo">

<form>

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text" class="form-control" placeholder="Seu nome">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Seu email">
</div>

<div class="mb-3">
<label class="form-label">Senha</label>
<input type="password" class="form-control" placeholder="Crie uma senha">
</div>

<div class="mb-3">
<label class="form-label">Confirmar senha</label>
<input type="password" class="form-control" placeholder="Confirme a sua senha">
</div>

<button class="btn btn-primary w-100">
Cadastrar
</button>

<div class="text-center mt-3">
<a href="login.html"> Já tenho conta </a>
</div>

</form>

</div>
</div>

</div>
</div>

</div>

</body>
</html>
