<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cadastro-Mix Conveniência</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        background-image: url("images/background-pattern.png");
      }

      .container {
        width: 1000px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 5px;
      }

      h2 {
        margin-bottom: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .col {
        flex: 1;
      }

      .col-2 {
        flex: 2;
      }

      label {
        font-size: 13px;
        display: block;
      }

      input,
      select {
        width: 100%;
        padding: 6px;
        margin-top: 3px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      .section {
        background: #013a8c;
        padding: 10px;
        margin-top: 20px;
        font-weight: bold;
        border-radius: 4px;
      }

      .cadastro {
        text-align: center;
        font-weight: bold;
        font-size: 28px;
        color: #013a8c;
        margin-bottom: 15px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container">
      <a href="index.html">
        <h2 class="mb-4 fw-bold">
          <h5 class="m-0">
            <img
              src="images/mixsemfundo.png"
              width="150"
              class="rounded mx-auto d-block"
              alt="logo"
            />
          </h5></h2
      ></a>
      <hr />
      <div class="cadastro">Cadastre-se</div>
      <div class="section row py-2" style="color: white">Dados de Login</div>
      <div class="mb-2 text-start">
        <div class="col">
          <label class="form-label fw-bold">CPF</label>
          <input
            type="number"
            class="form-control"
            placeholder="000.000.000-00"
          />
        </div>
        <div class="col">
          <label>Nome de Usuário</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu nome de usuário"
          />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>E-mail</label>
          <input
            type="email"
            class="form-control"
            placeholder="usuario@email.com"
          />
        </div>
        <div class="col">
          <label>Confirmar E-mail</label>
          <input
            type="email"
            class="form-control"
            placeholder="usuario@email.com"
          />
        </div>
        <div class="col">
          <label>Escolha a sua senha</label>
          <input
            type="password"
            class="form-control"
            placeholder="8 a 15 digitos"
          />
        </div>
        <div class="col">
          <label>Confirmar Senha</label>
          <input
            type="password"
            class="form-control"
            placeholder="8 a 15 digitos"
          />
        </div>
      </div>

      <div class="section row py-2" style="color: white">Dados de Contato</div>

      <div class="row">
        <div class="col">
          <label>Nome</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu nome"
          />
        </div>
        <div class="col">
          <label>Sobrenome</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu sobrenome"
          />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>CPF</label>
          <input
            type="number"
            class="form-control"
            placeholder="Digite seu CPF"
          />
        </div>
        <div class="col">
          <label>RG</label>
          <input
            type="number"
            class="form-control"
            placeholder="Digite seu RG"
          />
        </div>
        <div class="col">
          <label>Sexo</label>
          <select>
            <option>Selecione</option>
            <option>Feminino</option>
            <option>Masculino</option>
            <option>Não Informar</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>CEP</label>
          <input
            type="number"
            class="form-control"
            placeholder="Digite seu CEP"
          />
        </div>
        <div class="col-2">
          <label>Endereço</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu endereço completo"
          />
        </div>
        <div class="col">
          <label>Número</label>
          <input
            type="number"
            class="form-control"
            placeholder="Digite o Nº da residência"
          />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>Bairro</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu bairro"
          />
        </div>
        <div class="col">
          <label>Complemento</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite o complemento"
          />
        </div>
        <div class="col">
          <label>Cidade</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite sua cidade"
          />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label>Estado</label>
          <select>
            <option>Selecione</option>
            <option>AC</option>
            <option>AL</option>
            <option>AP</option>
            <option>AM</option>
            <option>BA</option>
            <option>CE</option>
            <option>DF</option>
            <option>ES</option>
            <option>GO</option>
            <option>MA</option>
            <option>MT</option>
            <option>MS</option>
            <option>MG</option>
            <option>PA</option>
            <option>PB</option>
            <option>PR</option>
            <option>PE</option>
            <option>PI</option>
            <option>RJ</option>
            <option>RN</option>
            <option>RS</option>
            <option>RO</option>
            <option>RR</option>
            <option>SC</option>
            <option>SP</option>
            <option>SE</option>
            <option>TO</option>
          </select>
        </div>
        <div class="col">
          <label>DDD + Telefone</label>
          <input
            type="phone"
            class="form-control"
            placeholder="Digite seu telefone"
          />
        </div>
        <div class="col">
          <label>DDD + Celular</label>
          <input
            type="phone"
            class="form-control"
            placeholder="Digite seu celular"
          />
        </div>
      </div>
      <br />

      <div class="d-flex justify-content-end">
        <button class="btn text-white" style="background: #013a8c">
          Cadastrar
        </button>
      </div>
    </div>
  </body>
</html>
