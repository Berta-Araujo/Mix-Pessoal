<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-image: url("images/background-pattern.png");
    }

    .card-login {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 10px;
      background: white;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }

    .btn-confirmar {
      background-color: #013A8C;
      color: white;
    }

    .btn-confirmar:hover {
      background-color: #013A8C;
    }

    .link-senha {
      font-size: 14px;
      text-decoration: underline;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="card-login text-center">

    <a href="index.html">
      <img src="images/mixsemfundo.png" width="100" class="rounded mx-auto d-block mb-3" alt="logo">
    </a>

    <!-- TIPO DE USUÁRIO -->
    <div class="d-flex justify-content-center mb-4 gap-4">
      
      <div class="form-check">
        <input class="form-check-input" type="radio" name="tipo" value="cliente" id="cliente" checked>
        <label class="form-check-label" for="cliente">Cliente</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="tipo" value="admin" id="admin">
        <label class="form-check-label" for="admin">Administrador</label>
      </div>

    </div>

    <!-- FORM -->
    <form onsubmit="return redirecionar(event)">
      
      <div class="mb-3 text-start">
        <label class="form-label fw-bold">Usuário</label>
        <input type="text" class="form-control" placeholder="Digite seu email" required>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label fw-bold">Senha</label>
        <input type="password" class="form-control" placeholder="Digite sua senha" required>
      </div>

      <button class="btn btn-confirmar w-100 mt-3">CONFIRMAR</button>

    </form>

    <div class="mt-4">
      <a href="cadastro.html" class="link-senha">Primeiro Acesso? Cadastre-se.</a><br>
      <a href="redefinirsenha.html" class="link-senha">Esqueci Minha Senha.</a>
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function redirecionar(event) {
      event.preventDefault();

      let tipo = document.querySelector('input[name="tipo"]:checked').value;

      if (tipo === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }
    }
  </script>

</body>
</html>
