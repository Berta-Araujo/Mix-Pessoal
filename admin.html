<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin:0; font-family: Arial; }

.sidebar {
  width:80px; height:100vh; background:#013A8C;
  position:fixed; display:flex; flex-direction:column; align-items:center;
}
.sidebar div { width:40px; height:5px; background:#ccc; margin:10px; }

.topbar {
  margin-left:80px; height:60px; background:#e5e5e5;
  display:flex; align-items:center; justify-content:space-between; padding:0 20px;
}

.content {
  margin-left:80px; padding:20px; background:#f5f5f5; min-height:100vh;
}

.tabs button {
  background:#013A8C; color:white; border:none; padding:10px;
}
.tabs .active { background:#013A8C; }

.btn-nova { background:#013A8C; color:white; }

.table-area { background:white; padding:10px; }
</style>
</head>

<body>
<!--  MELHORAR ISSO...
<div class="sidebar">
  <div>Produtos</div><hr>
  <div> Pessoas </div><hr>
  <div>Financeiro</div><hr>
</div>-->

<div class="topbar">
  <img src="images/mixsemfundo.png" width="50">
  <input type="text" class="form-control w-25" placeholder="Buscar..." id="busca">
  <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" width="30">
</div>

<div class="content">

<h5>Produtos e serviços</h5>

<div class="tabs mb-3">
  <button onclick="trocarAba('produtos', this)" class="active">Produtos</button>
  <button onclick="trocarAba('servicos', this)">Serviços</button>
  <button onclick="trocarAba('estoque', this)">Estoque</button>
</div>

<div class="d-flex justify-content-between mb-2">
  <button class="btn btn-nova" data-bs-toggle="modal" data-bs-target="#modal">+ Nova</button>
</div>

<div class="table-area">
<table class="table" id="tabela">
<thead>
<tr>
<th>Nome</th>
<th>Preço</th>
<th>Estoque</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>


<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content p-3">

<h5>Novo Item</h5>

<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="preco" class="form-control mb-2" placeholder="Preço">
<input id="estoque" class="form-control mb-2" placeholder="Estoque">

<button class="btn btn-success" onclick="adicionar()">Salvar</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let dados = {
  produtos: [],
  servicos: [],
  estoque: []
};

let abaAtual = "produtos";


function trocarAba(tipo, botao) {
  abaAtual = tipo;

  document.querySelectorAll(".tabs button").forEach(btn => btn.classList.remove("active"));
  botao.classList.add("active");

  renderizar();
}


function adicionar() {
  let nome = document.getElementById("nome").value;
  let preco = document.getElementById("preco").value;
  let estoque = document.getElementById("estoque").value;

  dados[abaAtual].push({ nome, preco, estoque });

  document.getElementById("nome").value = "";
  document.getElementById("preco").value = "";
  document.getElementById("estoque").value = "";

  bootstrap.Modal.getInstance(document.getElementById('modal')).hide();

  renderizar();
}


function renderizar() {
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  dados[abaAtual].forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.nome}</td>
        <td>${item.preco}</td>
        <td>${item.estoque}</td>
      </tr>
    `;
  });
}


document.getElementById("busca").addEventListener("input", function() {
  let valor = this.value.toLowerCase();
  let linhas = document.querySelectorAll("#tabela tbody tr");

  linhas.forEach(linha => {
    linha.style.display = linha.innerText.toLowerCase().includes(valor) ? "" : "none";
  });
});

</script>

</body>
</html>
