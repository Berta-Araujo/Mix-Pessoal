<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Mix - 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f6f8;
}

/* Card estilo MIX */
.card {
    border-radius: 10px;
    border: none;
}

/* Título */
.titulo {
    color: #012D78;
    font-weight: 600;
}

/* Círculo etapa */
.step {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid #012D78;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #012D78;
}

/* Botão padrão */
.btn-mix {
    background-color: #012D78;
    color: white;
}

.btn-mix:hover {
    background-color: #012D78;
}

</style>

</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="col-md-4">

<div class="card shadow p-4">


<h5 class="text-center titulo mb-4"> CRIE SUA CONTA </h5>

<!-- ETAPA -->
<div class="d-flex align-items-center mb-3">
    <div class="step me-3">1</div>
    <div>
        <strong style="color: #012D78"> Qual o seu endereço?</strong><br>
        <small class="text-muted">Informe onde deseja receber</small>
    </div>
</div>

<!-- FORM PARTE 1 -->
<form id="form1">

<input type="number" class="form-control mb-3 w-100 rounded-1" name="cep" placeholder="CEP">
<input type="text" class="form-control mb-3 w-100 rounded-1" name="rua" placeholder="Rua">

<div class="row">
    <div class="col">
        <input type="number" class="form-control mb-3 w-100 rounded-1" name="numero" placeholder="Número">
    </div>
    <div class="col">
        <input type="text" class="form-control mb-3 w-100 rounded-1" name="complemento" placeholder="Complemento">
    </div>
</div>

<input type="text" class="form-control mb-3 w-100 rounded-1" name="bairro" placeholder="Bairro">

<div class="row">
    <div class="col">
        <input type="text" class="form-control mb-3 w-100 rounded-1" name="cidade" placeholder="Cidade">
    </div>
    <div class="col">
        <input type="text" class="form-control mb-3 w-100 rounded-1" name="estado" placeholder="Estado">
    </div>
</div>

<input type="text" class="form-control mb-4 w-100 rounded-1" placeholder="Apelido do endereço">

<button type="submit" class="btn btn-primary w-100 rounded-1" ><a href="form2.html" style="color:aliceblue"> Avançar </a> 
</button>


</form>

</div>
</div>
</body>
</html>
